<!DOCTYPE html>
<html>
  <head>
    <title>UR3 WebAR con sonido</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <!-- Librerías principales -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/2.2.1/aframe/build/aframe-ar.js"></script>

    <style>
      body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        touch-action: none;
        font-family: system-ui, sans-serif;
      }

      /* Pantalla inicial */
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      #overlay button {
        background-color: #ff3333;
        color: white;
        border: none;
        padding: 12px 20px;
        font-size: 18px;
        border-radius: 8px;
        cursor: pointer;
      }

      #overlay button:hover {
        background-color: #ff5555;
      }
    </style>
  </head>

  <body>
    <!-- Overlay -->
    <div id="overlay">
      <p>🎧 Toca para iniciar el video con sonido</p>
      <button id="startBtn">Reproducir</button>
    </div>

    <!-- Escena AR -->
    <a-scene embedded arjs>

      <a-assets>
        <video 
          id="ur3video"
          src="ur3-video.mp4"
          preload="auto"
          playsinline
          webkit-playsinline
          loop>
        </video>
      </a-assets>

      <!-- Marker (se mantiene pero ya no contiene el video) -->
      <a-marker type="pattern" url="marker.patt" id="marker"></a-marker>

      <!-- Cámara con video FIJO -->
      <a-entity camera>

        <a-video
          src="#ur3video"
          width="20"
          height="12"
          position="0 0 -1.5">
        </a-video>

        <a-text
          value="UR3: 6 DOF | 3kg payload | 500mm reach"
          position="0 -2 -1.5"
          align="center"
          scale="1.5 1.5 1.5"
          color="red">
        </a-text>

      </a-entity>

    </a-scene>

    <script>
      const video = document.getElementById('ur3video');
      const marker = document.getElementById('marker');
      const overlay = document.getElementById('overlay');
      const startBtn = document.getElementById('startBtn');

      // Compatibilidad móvil
      video.playsInline = true;
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');

      // Botón para iniciar con audio
      startBtn.addEventListener('click', async () => {
        try {
          await video.play();
          overlay.style.display = 'none';
          console.log('🎬 Video con sonido reproducido');
        } catch (err) {
          alert('No se pudo reproducir el video con sonido: ' + err.message);
        }
      });

      // (Opcional) Mantener reproducción si detecta marker
      marker.addEventListener('markerFound', () => {
        if (video.paused) {
          video.play().catch(err => console.warn(err));
        }
      });

      marker.addEventListener('markerLost', () => {
        video.pause();
      });
    </script>

  </body>
</html>
