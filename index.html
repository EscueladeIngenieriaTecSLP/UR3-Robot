<!DOCTYPE html>
<html>
  <head>
    <title>UR3 WebAR con sonido</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <!-- Librerías principales -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/2.2.1/aframe/build/aframe-ar.js"></script>

    <style>
      body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        touch-action: none;
        font-family: system-ui, sans-serif;
      }

      /* Overlay inicial */
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      #overlay button {
        background-color: #ff3333;
        color: white;
        border: none;
        padding: 12px 20px;
        font-size: 18px;
        border-radius: 8px;
        cursor: pointer;
      }

      #overlay button:hover {
        background-color: #ff5555;
      }

      /* VIDEO FULLSCREEN REAL */
      #fullscreenVideo {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 5;
        display: none;
      }
    </style>
  </head>

  <body>
    <!-- Overlay -->
    <div id="overlay">
      <p>🎧 Toca para iniciar el video con sonido</p>
      <button id="startBtn">Reproducir</button>
    </div>

    <!-- VIDEO FULLSCREEN -->
    <video 
      id="fullscreenVideo"
      src="ur3-video.mp4"
      playsinline
      webkit-playsinline
      loop>
    </video>

    <!-- Escena AR (se mantiene igual) -->
    <a-scene embedded arjs>
      <a-assets>
        <video 
          id="ur3video"
          src="ur3-video.mp4"
          preload="auto"
          playsinline
          webkit-playsinline
          loop>
        </video>
      </a-assets>

      <a-marker type="pattern" url="marker.patt" id="marker"></a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const video = document.getElementById('fullscreenVideo');
      const marker = document.getElementById('marker');
      const overlay = document.getElementById('overlay');
      const startBtn = document.getElementById('startBtn');

      // Compatibilidad móvil
      video.playsInline = true;
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');

      // Botón para iniciar video fullscreen
      startBtn.addEventListener('click', async () => {
        try {
          await video.play();
          video.style.display = 'block';
          overlay.style.display = 'none';
          console.log('🎬 Video fullscreen con sonido');
        } catch (err) {
          alert('No se pudo reproducir el video: ' + err.message);
        }
      });

      // Opcional: controlar con marker
      marker.addEventListener('markerFound', () => {
        if (video.paused) {
          video.play().catch(err => console.warn(err));
        }
      });

      marker.addEventListener('markerLost', () => {
        video.pause();
      });
    </script>

  </body>
</html>
